<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inbox — DevBlock</title>
<link rel="stylesheet" href="../assets/css/main.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
.inbox-layout{display:grid;grid-template-columns:300px 1fr;gap:0;max-width:1100px;margin:20px auto;padding:0 16px 80px;height:calc(100vh - 140px);}
.convo-list{background:var(--bg2);border:1px solid var(--border);border-radius:12px 0 0 12px;overflow-y:auto;}
.convo-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.convo-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.convo-item:hover{background:var(--bg3);}
.convo-item.active{background:var(--bg3);border-left:2px solid var(--accent);}
.convo-info{flex:1;min-width:0;}
.convo-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.convo-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convo-time{font-size:11px;color:var(--text3);}
.chat-area{background:var(--bg2);border:1px solid var(--border);border-left:none;border-radius:0 12px 12px 0;display:flex;flex-direction:column;}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.sent{flex-direction:row-reverse;}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg.received .msg-bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;}
.msg.sent .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);margin-bottom:2px;}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.chat-input-area input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.chat-input-area input:focus{border-color:var(--accent);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;}
.new-msg-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div class="counter-bar">
  <span><i class="ti ti-users"></i> <strong id="online">312</strong> online</span>
  <span><i class="ti ti-message"></i> Inbox</span>
</div>
<div class="topbar">
  <a href="../index.html" class="logo">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect width="30" height="30" rx="7" fill="#1D9E75"/><path d="M8 10h6.5c1.8 0 3 1 3 2.6 0 1-.5 1.8-1.3 2.2 1 .3 1.8 1.2 1.8 2.4 0 1.8-1.3 2.8-3.3 2.8H8V10zm2 4.2h4c.8 0 1.4-.5 1.4-1.3 0-.8-.6-1.3-1.4-1.3H10v2.6zm0 4.2h4.3c.9 0 1.5-.5 1.5-1.4 0-.8-.6-1.4-1.5-1.4H10v2.8z" fill="white"/><rect x="20" y="10" width="2" height="10" rx="1" fill="white" opacity="0.6"/></svg>
    <div class="logo-wordmark"><span class="logo-block">Dev</span><span class="logo-dev">Block</span></div>
  </a>
  <div class="search-bar"><i class="ti ti-search"></i><input type="text" placeholder="Search messages..."/></div>
  <div class="topbar-right" id="topbarRight">
    <button class="btn theme-toggle" onclick="cycleTheme()"><i class="ti ti-palette"></i></button>
    <a href="auth.html" class="btn">Sign in</a>
    <button class="btn btn-primary" onclick="connectWallet()"><i class="ti ti-wallet"></i> Connect Wallet</button>
  </div>
</div>
<nav class="mobile-nav">
  <a href="../index.html" class="nav-tab"><i class="ti ti-home"></i><span>Feed</span></a>
  <a href="compete.html" class="nav-tab"><i class="ti ti-trophy"></i><span>Compete</span></a>
  <a href="news.html" class="nav-tab"><i class="ti ti-news"></i><span>News</span></a>
  <a href="inbox.html" class="nav-tab active"><i class="ti ti-message"></i><span>Inbox</span></a>
  <a href="my-ai.html" class="nav-tab"><i class="ti ti-robot"></i><span>My AI</span></a>
</nav>
<div class="inbox-layout">
  <div class="convo-list">
    <div class="convo-header">
      <h2 style="font-size:15px;font-weight:700;">Messages</h2>
      <button class="new-msg-btn" onclick="showNewMessage()"><i class="ti ti-edit"></i> New</button>
    </div>
    <div id="convoList"><div style="padding:20px;text-align:center;font-size:13px;color:var(--text3);">Loading...</div></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <i class="ti ti-message-2" style="font-size:48px;"></i>
      <div style="font-size:15px;font-weight:600;">Your Messages</div>
      <div style="font-size:13px;">Send a message to a fellow builder</div>
      <button class="btn btn-primary" onclick="showNewMessage()"><i class="ti ti-edit"></i> New Message</button>
    </div>
    <div id="activeChatHeader" style="display:none;" class="chat-header">
      <div class="avatar" style="background:#1D9E75;width:32px;height:32px;font-size:12px;" id="chatAvatar">?</div>
      <div>
        <div style="font-size:14px;font-weight:600;" id="chatName">...</div>
        <div style="font-size:12px;color:var(--accent);">online</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area" id="chatInputArea" style="display:none;">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button class="btn btn-primary" onclick="sendMessage()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>
<div id="newMsgModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;margin:16px;">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;">New Message</div>
    <input id="recipientInput" placeholder="Search username..." style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;box-sizing:border-box;" oninput="searchUsers()"/>
    <div id="userResults" style="margin-bottom:10px;max-height:150px;overflow-y:auto;"></div>
    <textarea id="firstMessage" placeholder="Write your first message..." rows="3" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;margin-bottom:16px;box-sizing:border-box;"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="document.getElementById('newMsgModal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="startConversation()">Send</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/wallet.js"></script>
<script src="../assets/js/auth-state.js"></script>
<script>
let activeConvoId = null
let selectedRecipient = null

async function loadConversations() {
  if (!window.currentUser) {
    document.getElementById('convoList').innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3);"><a href="auth.html" style="color:var(--accent);">Sign in</a> to view messages</div>'
    return
  }
  const { data: convos } = await window.supabaseClient
    .from('conversations')
    .select('*, p1:users!conversations_participant_1_fkey(username), p2:users!conversations_participant_2_fkey(username)')
    .or(`participant_1.eq.${window.currentUser.id},participant_2.eq.${window.currentUser.id}`)
    .order('last_message_at', { ascending: false })
  const list = document.getElementById('convoList')
  if (!convos || convos.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3);">No messages yet. Start a conversation!</div>'
    return
  }
  list.innerHTML = convos.map(c => {
    const other = c.participant_1 === window.currentUser.id ? c.p2 : c.p1
    const initials = (other?.username || 'AN').slice(0,2).toUpperCase()
    return `<div class="convo-item ${activeConvoId===c.id?'active':''}" onclick="openConvo('${c.id}','${other?.username}','${initials}')">
      <div class="avatar" style="background:#1D9E75;width:36px;height:36px;font-size:13px;">${initials}</div>
      <div class="convo-info">
        <div class="convo-name">${other?.username||'Unknown'}</div>
        <div class="convo-preview">${c.last_message||'No messages yet'}</div>
      </div>
      <div class="convo-time">${c.last_message_at?timeAgo(c.last_message_at):''}</div>
    </div>`
  }).join('')
}

async function openConvo(convoId, username, initials) {
  activeConvoId = convoId
  document.getElementById('emptyState').style.display = 'none'
  document.getElementById('activeChatHeader').style.display = 'flex'
  document.getElementById('chatInputArea').style.display = 'flex'
  document.getElementById('chatName').textContent = username
  document.getElementById('chatAvatar').textContent = initials
  loadConversations()
  const { data: msgs } = await window.supabaseClient
    .from('messages')
    .select('*, users(username)')
    .eq('conversation_id', convoId)
    .order('created_at', { ascending: true })
  const el = document.getElementById('chatMessages')
  if (!msgs || msgs.length === 0) {
    el.innerHTML = '<div style="text-align:center;font-size:13px;color:var(--text3);margin-top:20px;">No messages yet. Say hello!</div>'
    return
  }
  el.innerHTML = msgs.map(m => {
    const sent = m.sender_id === window.currentUser.id
    return `<div class="msg ${sent?'sent':'received'}">
      ${!sent?`<div class="avatar" style="background:#534AB7;width:24px;height:24px;font-size:9px;">${(m.users?.username||'an').slice(0,2).toUpperCase()}</div>`:''}
      <div>
        <div class="msg-time" style="text-align:${sent?'right':'left'}">${timeAgo(m.created_at)}</div>
        <div class="msg-bubble">${m.content}</div>
      </div>
    </div>`
  }).join('')
  el.scrollTop = el.scrollHeight
}

async function sendMessage() {
  if (!activeConvoId||!window.currentUser) return
  const input = document.getElementById('msgInput')
  const content = input.value.trim()
  if (!content) return
  input.value = ''
  await window.supabaseClient.from('messages').insert({ conversation_id: activeConvoId, sender_id: window.currentUser.id, content })
  await window.supabaseClient.from('conversations').update({ last_message: content, last_message_at: new Date().toISOString() }).eq('id', activeConvoId)
  openConvo(activeConvoId, document.getElementById('chatName').textContent, document.getElementById('chatAvatar').textContent)
}

async function searchUsers() {
  const q = document.getElementById('recipientInput').value.trim()
  if (!q) { document.getElementById('userResults').innerHTML=''; return }
  const { data: users } = await window.supabaseClient.from('users').select('id,username').ilike('username',`%${q}%`).neq('id',window.currentUser?.id).limit(5)
  document.getElementById('userResults').innerHTML = (users||[]).map(u =>
    `<div onclick="selectUser('${u.id}','${u.username}')" style="padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;background:var(--bg3);margin-bottom:4px;">
      <div class="avatar" style="background:#1D9E75;width:24px;height:24px;font-size:9px;">${u.username.slice(0,2).toUpperCase()}</div>
      ${u.username}
    </div>`).join('')
}

function selectUser(id, username) {
  selectedRecipient = { id, username }
  document.getElementById('recipientInput').value = username
  document.getElementById('userResults').innerHTML = ''
}

async function startConversation() {
  if (!selectedRecipient||!window.currentUser) return
  const content = document.getElementById('firstMessage').value.trim()
  if (!content) return
  const p1 = window.currentUser.id
  const p2 = selectedRecipient.id
  let { data: convo } = await window.supabaseClient.from('conversations').select('id').or(`and(participant_1.eq.${p1},participant_2.eq.${p2}),and(participant_1.eq.${p2},participant_2.eq.${p1})`).single()
  if (!convo) {
    const { data: newConvo } = await window.supabaseClient.from('conversations').insert({ participant_1: p1, participant_2: p2, last_message: content, last_message_at: new Date().toISOString() }).select().single()
    convo = newConvo
  }
  await window.supabaseClient.from('messages').insert({ conversation_id: convo.id, sender_id: p1, content })
  document.getElementById('newMsgModal').style.display = 'none'
  document.getElementById('firstMessage').value = ''
  const name = selectedRecipient.username
  const initials = name.slice(0,2).toUpperCase()
  selectedRecipient = null
  loadConversations()
  openConvo(convo.id, name, initials)
}

function showNewMessage() {
  if (!window.currentUser) { window.location.href='auth.html'; return }
  document.getElementById('newMsgModal').style.display = 'flex'
}

function timeAgo(date) {
  const diff = Date.now() - new Date(date)
  const mins = Math.floor(diff/60000)
  if (mins < 60) return mins+'m ago'
  const hrs = Math.floor(mins/60)
  if (hrs < 24) return hrs+'h ago'
  return Math.floor(hrs/24)+'d ago'
}

window.addEventListener('DOMContentLoaded', () => setTimeout(loadConversations, 800))
</script>
</body>
</html>
