<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up / Sign In — DevBlock</title>
<link rel="stylesheet" href="../assets/css/main.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
.auth-wrap { max-width: 420px; margin: 60px auto; padding: 0 16px; }
.auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
.auth-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.auth-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 24px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text2); }
.form-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
.form-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; justify-content: center; padding: 12px; font-size: 14px; margin-top: 8px; }
.auth-switch { text-align: center; font-size: 13px; color: var(--text2); margin-top: 16px; }
.auth-switch span { color: var(--accent); cursor: pointer; font-weight: 500; }
.auth-error { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
.auth-success { background: #E1F5EE; color: #0F6E56; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>
<div class="counter-bar">
  <span><i class="ti ti-users"></i> <strong>312</strong> builders on DevBlock</span>
</div>
<div class="topbar">
  <a href="../index.html" class="logo">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect width="30" height="30" rx="7" fill="#1D9E75"/><path d="M8 10h6.5c1.8 0 3 1 3 2.6 0 1-.5 1.8-1.3 2.2 1 .3 1.8 1.2 1.8 2.4 0 1.8-1.3 2.8-3.3 2.8H8V10zm2 4.2h4c.8 0 1.4-.5 1.4-1.3 0-.8-.6-1.3-1.4-1.3H10v2.6zm0 4.2h4.3c.9 0 1.5-.5 1.5-1.4 0-.8-.6-1.4-1.5-1.4H10v2.8z" fill="white"/><rect x="20" y="10" width="2" height="10" rx="1" fill="white" opacity="0.6"/></svg>
    <div class="logo-wordmark"><span class="logo-block">Dev</span><span class="logo-dev">Block</span></div>
  </a>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div id="signupView">
      <div class="auth-title">Join DevBlock 🚀</div>
      <div class="auth-sub">The web3 builder community</div>
      <div class="auth-error" id="signupError"></div>
      <div class="auth-success" id="signupSuccess"></div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="signupUsername" type="text" placeholder="yourname or yourname.eth"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="signupEmail" type="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="signupPassword" type="password" placeholder="Min 8 characters"/>
      </div>
      <button class="btn btn-primary auth-btn" onclick="signUp()">
        <i class="ti ti-user-plus"></i> Create Account
      </button>
      <div class="auth-switch">Already have an account? <span onclick="toggleView()">Sign in</span></div>
    </div>

    <div id="signinView" style="display:none">
      <div class="auth-title">Welcome back 👋</div>
      <div class="auth-sub">Sign in to DevBlock</div>
      <div class="auth-error" id="signinError"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="signinEmail" type="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="signinPassword" type="password" placeholder="Your password"/>
      </div>
      <button class="btn btn-primary auth-btn" onclick="signIn()">
        <i class="ti ti-login"></i> Sign In
      </button>
      <div class="auth-switch">No account yet? <span onclick="toggleView()">Sign up</span></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://sjplhedryfpztecxwztb.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqcGxoZWRyeWZwenRlY3h3enRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NTY3ODMsImV4cCI6MjA5NzEzMjc4M30.4sYA3s618LVb2En9L_emj5Nbu9wikvy3WjOK2Y4pQJA'
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function signUp() {
  const username = document.getElementById('signupUsername').value.trim()
  const email = document.getElementById('signupEmail').value.trim()
  const password = document.getElementById('signupPassword').value
  const errEl = document.getElementById('signupError')
  const sucEl = document.getElementById('signupSuccess')
  errEl.style.display = 'none'
  sucEl.style.display = 'none'

  if (!username || !email || !password) {
    errEl.textContent = 'Please fill in all fields.'
    errEl.style.display = 'block'
    return
  }
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.'
    errEl.style.display = 'block'
    return
  }

  const { data, error } = await db.auth.signUp({ email, password })
  if (error) {
    errEl.textContent = error.message
    errEl.style.display = 'block'
    return
  }

  if (data.user) {
    await db.from('users').insert({
      id: data.user.id,
      username,
      display_name: username
    })
  }

  sucEl.textContent = '✅ Account created! Check your email to confirm then sign in.'
  sucEl.style.display = 'block'
}

async function signIn() {
  const email = document.getElementById('signinEmail').value.trim()
  const password = document.getElementById('signinPassword').value
  const errEl = document.getElementById('signinError')
  errEl.style.display = 'none'

  const { data, error } = await db.auth.signInWithPassword({ email, password })
  if (error) {
    errEl.textContent = error.message
    errEl.style.display = 'block'
    return
  }

  window.location.href = '../index.html'
}

function toggleView() {
  const signup = document.getElementById('signupView')
  const signin = document.getElementById('signinView')
  signup.style.display = signup.style.display === 'none' ? 'block' : 'none'
  signin.style.display = signin.style.display === 'none' ? 'block' : 'none'
}
</script>
</body>
</html>
